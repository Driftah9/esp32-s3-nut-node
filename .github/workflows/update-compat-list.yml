name: Update Confirmed UPS List

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  update-confirmed-list:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'confirmed'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse issue and update confirmed-ups.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const body = issue.body || '';

            // ── Parse structured issue fields ──────────────────────────────
            function extractField(body, fieldId) {
              // GitHub issue forms render as:
              // ### Field Label\n\nValue\n\n
              const patterns = [
                new RegExp(`### UPS Manufacturer\\s*\\n+([^\\n#]+)`, 'i'),
                new RegExp(`### UPS Model\\s*\\n+([^\\n#]+)`, 'i'),
                new RegExp(`### USB VID:PID\\s*\\n+([^\\n#]+)`, 'i'),
                new RegExp(`### Firmware Version\\s*\\n+([^\\n#]+)`, 'i'),
                new RegExp(`### Does UPS status data appear[^\\n]*\\n+([^\\n#]+)`, 'i'),
              ];
              const labels = {
                manufacturer: patterns[0],
                model: patterns[1],
                vid_pid: patterns[2],
                firmware: patterns[3],
                status_reads: patterns[4],
              };
              const match = (labels[fieldId] || new RegExp(`_No response_`)).exec(body);
              return match ? match[1].trim() : '_unknown_';
            }

            const manufacturer = extractField(body, 'manufacturer');
            const model        = extractField(body, 'model');
            const vid_pid      = extractField(body, 'vid_pid');
            const firmware     = extractField(body, 'firmware');
            const statusReads  = extractField(body, 'status_reads');

            const issueNum  = issue.number;
            const issueUrl  = issue.html_url;
            const submitter = issue.user.login;
            const date      = new Date().toISOString().split('T')[0];

            // ── Build table row ────────────────────────────────────────────
            const newRow = `| ${manufacturer} ${model} | ${vid_pid} | ${firmware} | ${statusReads.startsWith('Yes') ? '✅ Confirmed' : '⚠️ Partial'} | @${submitter} | [#${issueNum}](${issueUrl}) | ${date} |`;

            // ── Read and update confirmed-ups.md ───────────────────────────
            const filePath = 'docs/confirmed-ups.md';
            let content = fs.readFileSync(filePath, 'utf8');

            // Insert before the "## Expected" section or at end of confirmed table
            const insertMarker = '\n## ⚠️ Expected';
            const tableHeader  = '| Device | VID:PID | Firmware | Status | Submitted by | Issue | Date |';

            if (content.includes(tableHeader)) {
              // Table exists — append row before the next section
              content = content.replace(insertMarker, `\n${newRow}${insertMarker}`);
            } else {
              // Table doesn't exist yet — add header + row
              const tableSection = `\n${tableHeader}\n|--------|---------|----------|--------|--------------|-------|------|\n${newRow}\n`;
              content = content.replace(insertMarker, `${tableSection}${insertMarker}`);
            }

            fs.writeFileSync(filePath, content);
            console.log(`Added: ${manufacturer} ${model} (${vid_pid})`);

      - name: Commit updated confirmed-ups.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/confirmed-ups.md
          git diff --cached --quiet || git commit -m "compat: add confirmed device from issue #${{ github.event.issue.number }}

          $(echo '${{ github.event.issue.title }}' | head -c 72)
          Auto-committed by update-compat-list workflow."
          git push

      - name: Post confirmation comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ Added to Confirmed List

This device has been added to [\`docs/confirmed-ups.md\`](../blob/main/docs/confirmed-ups.md).

Thank you for contributing to the compatibility list! 🎉`
            });
